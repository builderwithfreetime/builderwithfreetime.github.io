<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BWFT – BuilderWithFreeTime</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--blue:#3B82F6;
--blue-light:#60A5FA;
--blue-dark:#1D4ED8;
--bg:#050810;
--surface:#0D1117;
--surface2:#0f1623;
--border:rgba(255,255,255,0.07);
--muted:#6B7280;
--success:#10B981;
--error:#F87171;
}

html{scroll-behavior:smooth}
body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:#F9FAFB;
overflow-x:hidden;
}

nav{
position:fixed;
top:0;left:0;right:0;
z-index:100;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 6%;
height:64px;
background:rgba(5,8,16,0.9);
backdrop-filter:blur(16px);
border-bottom:1px solid var(--border)
}

.nav-logo{font-size:.98rem;font-weight:800}
.nav-logo em{color:var(--blue-light);font-style:normal}

.nav-links{display:flex;gap:2rem}
.nav-links a{
color:var(--muted);
text-decoration:none;
font-size:.84rem;
font-weight:500;
transition:color .2s
}
.nav-links a:hover{color:#fff}

.nav-pill{
background:rgba(59,130,246,0.15);
border:1px solid rgba(59,130,246,0.3);
color:var(--blue-light);
font-size:.7rem;
font-weight:700;
padding:.28rem .8rem;
border-radius:50px;
letter-spacing:.5px;
text-transform:uppercase
}

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:90px 6% 60px;
position:relative;
}

.hero::before{
content:'';
position:absolute;
top:-150px;
left:50%;
transform:translateX(-50%);
width:800px;height:800px;
background:radial-gradient(circle,rgba(59,130,246,0.13) 0%,transparent 68%);
pointer-events:none
}

.hero h1{
font-size:clamp(2.8rem,6.5vw,5rem);
font-weight:900;
line-height:1.04;
letter-spacing:-2.5px;
max-width:820px;
background:linear-gradient(140deg,#fff 45%,#93C5FD);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero-sub{
font-size:clamp(.93rem,1.8vw,1.1rem);
color:var(--muted);
margin:1.4rem 0 2.8rem;
max-width:500px;
line-height:1.75
}

.form-wrap{
width:100%;
max-width:470px;
display:flex;
flex-direction:column;
align-items:center;
gap:.7rem
}

.input-row{
display:flex;
width:100%;
gap:.6rem
}

.input-row input{
flex:1;
background:rgba(255,255,255,0.05);
border:1px solid var(--border);
border-radius:10px;
padding:.82rem 1.1rem;
color:#fff;
font-size:.9rem;
outline:none;
transition:border .2s,box-shadow .2s
}

.input-row input:focus{
border-color:rgba(59,130,246,.6);
box-shadow:0 0 0 2px rgba(59,130,246,.2)
}

.btn{
background:var(--blue);
border:none;
border-radius:10px;
padding:.82rem 1.4rem;
color:#fff;
font-size:.9rem;
font-weight:700;
cursor:pointer;
transition:all .2s;
box-shadow:0 0 28px rgba(59,130,246,.35)
}

.btn:hover{
background:var(--blue-dark);
transform:translateY(-2px)
}

.btn.loading{
opacity:.7;
cursor:not-allowed
}

.message{
font-size:.8rem;
margin-top:.5rem;
min-height:20px;
transition:opacity .3s
}

.success{color:var(--success)}
.error{color:var(--error)}

footer{
border-top:1px solid var(--border);
padding:2rem;
text-align:center;
color:var(--muted);
margin-top:100px
}

@media(max-width:680px){
.nav-links{display:none}
.input-row{flex-direction:column}
.btn{width:100%}
}
</style>
</head>

<body>

<nav>
  <div class="nav-logo"><em>Builder</em>WithFreeTime</div>
  <div class="nav-links">
    <a href="#how">How it works</a>
    <a href="#features">Features</a>
  </div>
  <div class="nav-pill">Early Access</div>
</nav>

<section class="hero">
  <h1>Stop procrastinating.<br>Start building.</h1>
  <p class="hero-sub">
    BWFT turns entrepreneurship into an addictive game.
  </p>

  <div class="form-wrap">
    <div class="input-row">
      <input type="email" id="emailInput" placeholder="your@email.com" />
      <button class="btn" id="submitBtn">Get Early Access</button>
    </div>
    <div id="formMessage" class="message"></div>
  </div>
</section>

<footer>
  2026 BuilderWithFreeTime (BWFT) — Stop procrastinating. Start building.
</footer>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbywvPrTNHrL4ZEGYju-cCJSs9hQUIe3gLrhrvhjWP1QUBoVWIbUVXAYWqA4Tp_PXu8bTA/exec";

const emailInput = document.getElementById("emailInput");
const submitBtn = document.getElementById("submitBtn");
const message = document.getElementById("formMessage");

function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

submitBtn.addEventListener("click", async () => {

  const email = emailInput.value.trim();

  if (!validateEmail(email)) {
    message.textContent = "Please enter a valid email.";
    message.className = "message error";
    emailInput.style.borderColor = "var(--error)";
    return;
  }

  submitBtn.classList.add("loading");
  submitBtn.textContent = "Submitting...";
  message.textContent = "";

  try {
    await fetch(scriptURL, {
      method: "POST",
      mode: "no-cors",
      body: new URLSearchParams({ email: email })
    });

    message.textContent = "You're on the list 🚀";
    message.className = "message success";

    setTimeout(() => {
      window.location.href = "acknoledgements";
    }, 1200);

  } catch (error) {
    message.textContent = "Something went wrong. Try again.";
    message.className = "message error";
    submitBtn.classList.remove("loading");
    submitBtn.textContent = "Get Early Access";
  }
});
</script>

</body>
</html>
